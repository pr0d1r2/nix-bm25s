---
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: pr0d1r2/nix-lefthook-ci-action@3a98818fb8cbac6c6f328c2bb1c76d15c7457644
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  build-darwin:
    needs: build-linux
    runs-on: macos-latest
    steps:
      - uses: pr0d1r2/nix-lefthook-ci-action@3a98818fb8cbac6c6f328c2bb1c76d15c7457644
        with:
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}

  build-linux-arm:
    needs: build-linux
    runs-on: ubuntu-latest
    steps:
      - uses: pr0d1r2/nix-lefthook-ci-action@3a98818fb8cbac6c6f328c2bb1c76d15c7457644
        with:
          extra-platforms: aarch64-linux
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
